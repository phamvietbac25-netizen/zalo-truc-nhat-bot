services:
  - type: web
    name: zalo-truc-nhat-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ZALO_BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET_TOKEN
        sync: false

